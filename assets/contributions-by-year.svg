<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bar0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff79c6"/>
      <stop offset="100%" stop-color="#bd93f9"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#6272a4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50fa7b"/>
      <stop offset="100%" stop-color="#28a745"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#f1fa8c"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="#282a36"/>
  <rect width="800" height="320" rx="16" fill="none" stroke="#44475a" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="18" font-weight="600">Contributions - Last 5 Months</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="250" stroke="#44475a" stroke-width="0.5"/>
  <line x1="100" y1="250" x2="720" y2="250" stroke="#44475a" stroke-width="1"/>
  <line x1="100" y1="208" x2="720" y2="208" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="160" x2="720" y2="160" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="118" x2="720" y2="118" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="70" x2="720" y2="70" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="90" y="254" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">0</text>
  <text x="90" y="212" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">7</text>
  <text x="90" y="164" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">15</text>
  <text x="90" y="122" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">22</text>
  <text x="90" y="74" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">30</text>

  <!-- Bars -->
  <rect x="170" y="250.0" width="80" height="0.0" rx="4" fill="url(#bar0)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="0.0" dur="0.6s" fill="freeze"/>
    <animate attributeName="y" from="250" to="250.0" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="210" y="242" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">0</text>
  <text x="210" y="272" text-anchor="middle" fill="#bd93f9" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2025-12</text>
  <rect x="270" y="250.0" width="80" height="0.0" rx="4" fill="url(#bar1)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="0.0" dur="0.7s" fill="freeze"/>
    <animate attributeName="y" from="250" to="250.0" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="310" y="242" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">0</text>
  <text x="310" y="272" text-anchor="middle" fill="#8be9fd" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2026-01</text>
  <rect x="370" y="88.0" width="80" height="162.0" rx="4" fill="url(#bar2)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="162.0" dur="0.8s" fill="freeze"/>
    <animate attributeName="y" from="250" to="88.0" dur="0.8s" fill="freeze"/>
  </rect>
  <text x="410" y="80" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">27</text>
  <text x="410" y="272" text-anchor="middle" fill="#50fa7b" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2026-02</text>
  <rect x="470" y="94.0" width="80" height="156.0" rx="4" fill="url(#bar3)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="156.0" dur="0.9s" fill="freeze"/>
    <animate attributeName="y" from="250" to="94.0" dur="0.9s" fill="freeze"/>
  </rect>
  <text x="510" y="86" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">26</text>
  <text x="510" y="272" text-anchor="middle" fill="#ffb86c" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2026-03</text>
  <rect x="570" y="154.0" width="80" height="96.0" rx="4" fill="url(#bar4)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="96.0" dur="1.0s" fill="freeze"/>
    <animate attributeName="y" from="250" to="154.0" dur="1.0s" fill="freeze"/>
  </rect>
  <text x="610" y="146" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">16</text>
  <text x="610" y="272" text-anchor="middle" fill="#ff5555" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2026-04</text>

  <!-- Footer -->
  <text x="400" y="300" text-anchor="middle" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11">Total: 69 contributions in the last 5 months</text>
</svg>
